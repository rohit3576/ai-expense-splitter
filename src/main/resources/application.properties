# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/expense_splitter?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration
server.port=8080

# Google Gemini API Configuration
# Get your free API key from: https://makersuite.google.com/app/apikey
# IMPORTANT: Never commit your actual API key to GitHub! Use environment variable for production
gemini.api.key=YOUR_GEMINI_API_KEY_HERE
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# Cache Configuration (for AI responses)
spring.cache.type=simple
spring.cache.cache-names=gemini-insights,gemini-recommendations,gemini-predictions,gemini-fairness

# AI Features Configuration
ai.enabled=true
ai.default-language=en
ai.timeout-seconds=30
ai.max-retries=3

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.example.ai_expense_spliter=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
logging.level.org.hibernate.SQL=DEBUG